<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Formulario de registro</title>
    </head>
    <body>
        <h1>¡Regístrate y únete a la comunidad!</h1>
        <form action="/registro" method="post">
            <div>
                <label>Nombre: </label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre " />
            </div>
            <div>
                <label>Apellido: </label>
                <input type="text" id="apellido" name="apellido" placeholder="Ingresa tu apellido " />
            </div>
            <div>
                <label>Correo electrónico: </label>
                <input type="text"  id="correo" name="correo" placeholder="Ingresa tu correo " />
            </div>
            <div>
                <label>Contraseña: </label>
                <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contraseña" />
            </div>
            <div>
                <label>Confirmar contraseña: </label>
                <input type="password"  id="confirmar_contrasena" name="confirmar_contrasena" placeholder="Confirma tu contraseña" />
            </div>
            <div>
                <label for="fecha_nacimiento">Fecha de nacimiento: </label>
                <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" />
            </div>
            <div>
                <label>Género:</label> 
                <input type="radio" id="masculino" name="genero" value="masculino" />
                <label for="masculino">Masculino</label>
                <input type="radio" id="femenino" name="genero" value="femenino" />
                <label for="femenino">Femenino</label>
                <input type="radio" id="prefieronodecirlo" name="genero" value="prefieronodecirlo" />
                <label for="prefieronodecirlo">Prefiero no decirlo</label>
            </div>
            <div>
                <input type="checkbox" name="suscribirse" id="suscribirse" checked />
                <label for="suscribirse">Suscríbete a nuestro boletín de noticias</label>
            </div>
            <div>
                <label for="descripcion">Una descripción de mi mismo: </label>
                <textarea id="descripcion" name="descripcion" rows="4" cols="30"></textarea>
            </div>
            <div>
                <label for="intereses">Selecciona tus intereses: </label>
                <select id="intereses" name="intereses">
                    <option value="musica">Música</option>
                    <option value="deportes">Deportes</option>
                    <option value="viajes">Viajes</option>
                    <option value="tecnologia">Tecnología</option></select>
            </div>
            <input type="submit" value="¡Registrarse!" />
        </form>
    </body>
</html>
